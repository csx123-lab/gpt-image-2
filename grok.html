<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>千亿AI - Grok Video 生成</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0a0a14;color:#e0e0e0;min-height:100vh}
.container{max-width:600px;margin:0 auto;padding:2rem 1rem}
header{text-align:center;margin-bottom:2rem}
header h1{font-size:1.5rem;font-weight:700;margin-bottom:.3rem}
header p{color:#666;font-size:.82rem}
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:1.5rem;margin-bottom:1rem}
.card h3{font-size:.8rem;color:#7878a0;margin-bottom:1rem;font-weight:600}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:.8rem;color:#8888aa;margin-bottom:.3rem;font-weight:500}
input,textarea,select{width:100%;padding:.7rem .9rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:#e0e0e0;font-size:.9rem;outline:none;font-family:inherit}
textarea{resize:vertical;min-height:70px}
input:focus,textarea:focus,select:focus{border-color:#10a37f;box-shadow:0 0 0 1px rgba(16,163,127,.2)}
select{cursor:pointer}
select option{background:#0c0c18;color:#e0e0e0}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
@media(max-width:500px){.form-row{grid-template-columns:1fr}}
.btn{width:100%;padding:.8rem;border:none;border-radius:12px;background:linear-gradient(135deg,#10a37f,#06b6d4);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-sm{padding:.4rem .8rem;border:1px solid rgba(255,255,255,.08);border-radius:8px;background:rgba(255,255,255,.04);color:#8888aa;font-size:.75rem;cursor:pointer}
.btn-sm:hover{background:rgba(255,255,255,.08);color:#c0c0d0}
.msg{padding:.7rem .9rem;border-radius:10px;margin-top:.8rem;font-size:.85rem}
.msg-error{color:#f87171;background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.12)}
.msg-warning{color:#fbbf24;background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.12)}
.msg-info{color:#93c5fd;background:rgba(147,197,253,.06);border:1px solid rgba(147,197,253,.12)}
.msg-success{color:#6ee7b7;background:rgba(110,231,183,.06);border:1px solid rgba(110,231,183,.12)}
.result-area{display:none}
.result-area.visible{display:block}
video{width:100%;border-radius:10px}
.model-desc{background:rgba(16,163,127,.06);border:1px solid rgba(16,163,127,.1);border-radius:10px;padding:.6rem .9rem;margin-bottom:.8rem;font-size:.82rem}
.status-text{font-size:.85rem;color:#93c5fd;margin-top:.5rem}
.history-item{display:flex;gap:.8rem;padding:.8rem 0;border-bottom:1px solid rgba(255,255,255,.04);align-items:center}
.history-item:last-child{border-bottom:none}
.history-thumb{width:80px;height:45px;border-radius:6px;background:rgba(255,255,255,.04);flex-shrink:0;overflow:hidden}
.history-thumb video,.history-thumb img{width:100%;height:100%;object-fit:cover}
.history-info{flex:1;min-width:0}
.history-info .hi-model{font-size:.75rem;color:#10a37f}
.history-info .hi-prompt{font-size:.8rem;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-info .hi-time{font-size:.7rem;color:#555}
.history-actions{display:flex;gap:.3rem}
</style>
</head>
<body>
<div class="container">

<header>
  <div style="display:flex;align-items:center;justify-content:center;gap:.5rem;margin-bottom:.5rem">
    <svg width="28" height="28" viewBox="0 0 34 34" fill="none">
      <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#10a37f"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient></defs>
      <rect x="2" y="2" width="30" height="30" rx="8" fill="url(#g)" opacity=".12"/>
      <rect x="2" y="2" width="30" height="30" rx="8" stroke="url(#g)" stroke-width="1.2" opacity=".4"/>
      <path d="M10 17l5 5 9-9" stroke="url(#g)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span style="font-weight:800;font-size:1.1rem;background:linear-gradient(135deg,#10a37f,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">千亿AI</span>
  </div>
  <h1>Grok Video 生成</h1>
  <p>xAI Grok 视频生成 · 支持垫图</p>
</header>

<div class="card">
  <h3>生成设置</h3>
  <div class="form-group">
    <label>API 密钥</label>
    <input type="password" id="apiKey" placeholder="输入密钥" />
  </div>
  <div class="form-group">
    <label>模型</label>
    <select id="modelSelect">
      <option value="grok-video-3-10s" selected>grok-video-3-10s</option>
      <option value="grok-videos">grok-videos</option>
    </select>
  </div>
  <div class="model-desc" id="modelDesc">grok-video-3 - 最新版</div>
  <div class="form-row">
    <div class="form-group">
      <label>画面比例</label>
      <select id="aspectSelect">
        <option value="3:2">3:2（横屏）</option>
        <option value="2:3">2:3（竖屏）</option>
        <option value="1:1">1:1（方形）</option>
      </select>
    </div>
    <div class="form-group">
      <label>画质</label>
      <select id="sizeSelect">
        <option value="720P">720P</option>
        <option value="1080P">1080P</option>
      </select>
    </div>
  </div>
  <div class="form-group" style="border:1px dashed rgba(255,255,255,.08);border-radius:10px;padding:1rem;">
    <label style="display:flex;align-items:center;gap:.4rem">
      <input type="checkbox" id="enableImage" /> 垫图
    </label>
    <div id="imageFields" style="display:none;margin-top:.8rem">
      <div class="form-group">
        <label>上传图片（自动转 URL）</label>
        <input type="file" id="imageFileInput" accept="image/*" multiple style="padding:.5rem;font-size:.8rem" />
        <div style="font-size:.75rem;color:#666;margin-top:.3rem">垫图后视频尺寸跟着图片尺寸走</div>
      </div>
      <div class="form-group" style="margin-top:.5rem;padding-top:.8rem;border-top:1px solid rgba(255,255,255,.06)">
        <label>或粘贴图片 URL</label>
        <input type="text" id="imageUrls" placeholder="https://example.com/img.png" />
        <div style="font-size:.75rem;color:#666;margin-top:.3rem">多个 URL 用逗号分隔，填 URL 时忽略上方上传文件</div>
      </div>
    </div>
  </div>
  <div class="form-group">
    <label>视频描述（支持 --mode=custom 等参数）</label>
    <textarea id="prompt" placeholder="小猫在吃鱼 --mode=custom"></textarea>
  </div>
  <button class="btn" id="generateBtn">生成视频</button>
  <div id="messageArea"></div>
  <div class="status-text" id="statusText"></div>
</div>

<div class="card result-area" id="resultArea">
  <h3>生成结果</h3>
  <div id="videoContainer"></div>
</div>

<div class="card" id="historyCard">
  <h3>历史记录 <span id="historyCount"></span></h3>
  <div id="historyList"></div>
  <div style="text-align:center;padding:1rem;color:#555;font-size:.85rem" id="historyEmpty">暂无记录</div>
</div>

</div>

<script>
const API='https://api.vectorengine.cn';
const $=id=>document.getElementById(id);
const MODEL_DESC={'grok-video-3-10s':'10秒版','grok-videos':'视频生成'};
$('modelSelect').onchange=()=>{$('modelDesc').textContent=$('modelSelect').value+' - '+(MODEL_DESC[$('modelSelect').value]||'')};
$('modelSelect').dispatchEvent(new Event('change'));
$('enableImage').onchange=function(){$('imageFields').style.display=this.checked?'block':'none'};

// 历史
function gh(){try{return JSON.parse(localStorage.getItem('grok_history')||'[]')}catch{return[]}}
function sh(i){localStorage.setItem('grok_history',JSON.stringify(i))}
function ah(it){const i=gh();i.unshift(it);if(i.length>50)i.length=50;sh(i);rh()}
function rh(){const i=gh();$('historyCount').textContent=i.length?'('+i.length+')':'';if(!i.length){$('historyList').innerHTML='';$('historyEmpty').style.display='block';return}
$('historyEmpty').style.display='none';$('historyList').innerHTML=i.map((it,idx)=>'<div class="history-item"><div class="history-thumb"><video src="'+it.u+'" muted preload="metadata"></video></div><div class="history-info"><div class="hi-model">'+it.m+'</div><div class="hi-prompt">'+eh(it.p.slice(0,60))+'</div><div class="hi-time">'+new Date(it.t).toLocaleString()+'</div></div><div class="history-actions"><button class="btn-sm" onclick="ph('+idx+')">播放</button><button class="btn-sm" onclick="ch('+idx+')">链接</button><button class="btn-sm" onclick="dh('+idx+')" style="color:#f87171">删除</button></div></div>').join('')}
function eh(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function ph(i){const it=gh()[i];if(!it)return;$('videoContainer').innerHTML='<video src="'+it.u+'" controls autoplay style="width:100%"></video>';$('resultArea').classList.add('visible');$('resultArea').scrollIntoView({behavior:'smooth'})}
function ch(i){const it=gh()[i];if(it)navigator.clipboard.writeText(it.u).then(()=>sm('success','链接已复制'))}
function dh(i){const it=gh();it.splice(i,1);sh(it);rh()}
rh();

// 提取视频URL
function extractUrl(d){
  if(!d)return '';
  if(typeof d.video_url==='string'&&d.video_url)return d.video_url;
  if(d.data&&typeof d.data.video_url==='string'&&d.data.video_url)return d.data.video_url;
  if(d.data&&d.data.detail&&typeof d.data.detail.download_url==='string')return d.data.detail.download_url;
  if(d.detail&&d.detail.upsample_video_url)return d.detail.upsample_video_url;
  if(d.detail&&d.detail.video_url)return d.detail.video_url;
  if(d.upsample_video_url)return d.upsample_video_url;
  return '';
}

// 生成
$('generateBtn').onclick=async function(){
  const key=$('apiKey').value.trim(),prompt=$('prompt').value.trim(),model=$('modelSelect').value;
  if(!key){sm('error','请输入密钥');return}
  if(!prompt){sm('error','请输入描述');return}
  clr();$('statusText').textContent='';$('resultArea').classList.remove('visible');
  this.disabled=true;this.textContent='生成中...';

  try{
    const body={model,prompt,aspect_ratio:$('aspectSelect').value,size:$('sizeSelect').value};
    if($('enableImage').checked){
      // 先检查是否有 URL
      const urlText=$('imageUrls').value.trim();
      const urlImages=urlText.split(',').map(s=>s.trim()).filter(Boolean);
      if(urlImages.length>0){
        body.images=urlImages;
      } else {
        // 上传文件 -> canvas 压缩 -> base64
        const files=$('imageFileInput').files;
        if(files.length>0){
          body.images=[];
          for(const f of files) body.images.push(await fileToBase64(f));
        }
      }
    }

    sm('info','提交任务...');
    const resp=await fetch(API+'/v1/video/create',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify(body)});
    if(!resp.ok){let e;try{e=await resp.json()}catch{throw new Error(await resp.text())};throw new Error(e.message||JSON.stringify(e))}
    const data=await resp.json();

    let vu=extractUrl(data);
    if(vu){showVid(vu,model,prompt);return}
    if(data.status==='SUCCESS'){vu=extractUrl(data.data||data);if(vu){showVid(vu,model,prompt);return}}

    const tid=data.id||data.task_id;
    if(!tid){sm('warning','未获取到任务ID: '+JSON.stringify(data).slice(0,200));return}
    $('statusText').textContent='任务已提交，查询进度...';
    poll(key,tid,model,prompt);

  }catch(e){sm('error',e.message||'请求失败')}
  this.disabled=false;this.textContent='生成视频';
};

// 轮询
async function poll(key,tid,model,prompt){
  for(let i=0;i<120;i++){
    await new Promise(r=>setTimeout(r,3000));
    try{
      const resp=await fetch(API+'/v1/video/query?id='+encodeURIComponent(tid),{method:'GET',headers:{'Accept':'application/json','Authorization':'Bearer '+key}});
      if(!resp.ok)continue;
      const d=await resp.json();
      const st=(d.status||'').toLowerCase();
      if(d.progress)$('statusText').textContent='生成中 '+(d.progress||'');
      else if(i%10===0)$('statusText').textContent='生成中... ('+Math.round(i*3)+'s)';
      if(st==='completed'){let vu=extractUrl(d)||extractUrl(d.data||d.detail);if(vu){showVid(vu,model,prompt);return}}
      if(st==='failed'||st==='error'){let err=d.error||(d.data&&d.data.error&&d.data.error.message)||d.fail_reason||st;sm('error','生成失败: '+err);return}
    }catch(e){if(i>5)throw e}
  }
  sm('warning','等待超时, task_id: '+tid);
}

function showVid(url,model,prompt){
  $('videoContainer').innerHTML='<video src="'+url+'" controls autoplay style="width:100%"></video>';
  $('resultArea').classList.add('visible');
  $('resultArea').scrollIntoView({behavior:'smooth'});
  ah({u:url,m:model,p:prompt||'(空)',t:Date.now()});
  sm('success','生成成功！');
}

function sm(t,txt){$('messageArea').innerHTML='<div class="msg msg-'+t+'">'+txt+'</div>'}
function clr(){$('messageArea').innerHTML='';$('statusText').textContent=''}
try{const s=localStorage.getItem('gk_video_key');if(s)$('apiKey').value=s}catch(e){}
$('apiKey').oninput=function(){try{localStorage.setItem('gk_video_key',this.value.trim())}catch(e){}};

// 图片转 base64（canvas 压缩）
function fileToBase64(file){
  return new Promise((ok,no)=>{
    const r=new FileReader();
    r.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement('canvas');
        let w=img.width,h=img.height,mx=1024;
        if(w>mx||h>mx){if(w>h){h=Math.round(h*mx/w);w=mx}else{w=Math.round(w*mx/h);h=mx}}
        c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        ok(c.toDataURL(file.type,.7));
      };
      img.onerror=()=>ok(r.result);
      img.src=r.result;
    };
    r.onerror=no;
    r.readAsDataURL(file);
  });
}
</script>
</body>
</html>
