<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>千亿AI - AI 创作平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:#0a0a14;
  color:#e0e0e0;
  min-height:100vh;
  display:flex;
}
.sidebar{
  width:220px;
  background:rgba(255,255,255,.02);
  border-right:1px solid rgba(255,255,255,.06);
  padding:1.5rem 0;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
}
.sidebar-brand{
  display:flex;
  align-items:center;
  gap:.5rem;
  padding:0 1.2rem 1.5rem;
  border-bottom:1px solid rgba(255,255,255,.06);
  margin-bottom:.5rem;
}
.sidebar-brand span{
  font-weight:800;
  font-size:1.1rem;
  background:linear-gradient(135deg,#10a37f,#06b6d4);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.sidebar .nav-item{
  display:flex;
  align-items:center;
  gap:.6rem;
  padding:.7rem 1.2rem;
  color:#7878a0;
  cursor:pointer;
  transition:all .15s;
  font-size:.88rem;
  border-left:2px solid transparent;
}
.sidebar .nav-item:hover{color:#c0c0d8;background:rgba(255,255,255,.02)}
.sidebar .nav-item.active{
  color:#10a37f;
  border-left-color:#10a37f;
  background:rgba(16,163,127,.04);
}
.main{flex:1;overflow:hidden}
.main iframe{width:100%;height:100vh;border:none;display:block}

@media(max-width:640px){
  body{flex-direction:column}
  .sidebar{width:100%;flex-direction:row;overflow-x:auto;padding:.5rem;border-right:none;border-bottom:1px solid rgba(255,255,255,.06)}
  .sidebar-brand{display:none}
  .sidebar .nav-item{white-space:nowrap;border-left:none;border-bottom:2px solid transparent;padding:.5rem .8rem;font-size:.8rem}
  .sidebar .nav-item.active{border-left:none;border-bottom-color:#10a37f}
  .main iframe{height:calc(100vh - 48px)}
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand">
    <svg width="24" height="24" viewBox="0 0 34 34" fill="none">
      <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#10a37f"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient></defs>
      <rect x="2" y="2" width="30" height="30" rx="8" fill="url(#g)" opacity=".12"/>
      <rect x="2" y="2" width="30" height="30" rx="8" stroke="url(#g)" stroke-width="1.2" opacity=".4"/>
      <path d="M10 17l5 5 9-9" stroke="url(#g)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>千亿AI</span>
  </div>

  <div class="nav-item active" data-page="gpt-image-2" onclick="switchPage(this)">
    GPT Image 2
  </div>
  <div class="nav-item" data-page="veo" onclick="switchPage(this)">
    VEO 视频
  </div>
  <div class="nav-item" data-page="grok" onclick="switchPage(this)">
    Grok 视频
  </div>
</div>

<div class="main">
  <iframe src="gpt-image-2.html"></iframe>
</div>

<script>
function switchPage(el) {
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active')});
  el.classList.add('active');
  var pages={'gpt-image-2':'gpt-image-2.html','veo':'veo.html','grok':'grok.html'};
  var u=pages[el.dataset.page];
  if(u) document.querySelector('.main').innerHTML='<iframe src="'+u+'"></iframe>';
}
</script>
</body>
</html>
