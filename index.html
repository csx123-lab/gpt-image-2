<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>千亿AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif;background:#07070d;color:#d0d0e0}
.app{display:flex;height:100vh}
.sidebar{width:200px;flex-shrink:0;background:rgba(255,255,255,.02);border-right:1px solid rgba(255,255,255,.06);padding:1rem 0;display:flex;flex-direction:column}
.sidebar .brand{padding:.8rem 1rem;margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem}
.sidebar .brand-icon{width:30px;height:30px;background:linear-gradient(135deg,#6366f1,#06b6d4);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.8rem;color:#fff;font-weight:700}
.sidebar .brand-text{font-size:.95rem;font-weight:700;background:linear-gradient(135deg,#818cf8,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-item{display:flex;align-items:center;gap:.5rem;padding:.65rem 1rem;margin:2px 6px;border-radius:8px;cursor:pointer;font-size:.82rem;color:#8888a0;transition:all .15s;user-select:none}
.nav-item:hover{background:rgba(255,255,255,.04);color:#c0c0d0}
.nav-item.active{background:rgba(99,102,241,.1);color:#818cf8}
.nav-item .ico{font-size:.9rem}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-header{padding:.7rem 1.2rem;border-bottom:1px solid rgba(255,255,255,.06);font-size:.85rem;color:#666680;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.main-header .page-title{font-weight:600;color:#b0b0c0}
.page-container{flex:1;overflow:hidden}
.page-container iframe{width:100%;height:100%;border:none;background:transparent}
@media(max-width:640px){
  .sidebar{width:60px}
  .sidebar .brand-text,.sidebar .nav-item span:not(.ico){display:none}
  .sidebar .nav-item{justify-content:center;padding:.65rem}
}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="brand">
      <div class="brand-icon">✦</div>
      <span class="brand-text">千亿AI</span>
    </div>
    <div class="nav-item active" data-page="gpt" onclick="switchPage('gpt')">
      <span class="ico">🎨</span><span> GPT Image 2</span>
    </div>
    <div class="nav-item" data-page="grok" onclick="switchPage('grok')">
      <span class="ico">🎬</span><span> Grok 视频</span>
    </div>
    <div class="nav-item" data-page="veo" onclick="switchPage('veo')">
      <span class="ico">🎥</span><span> VEO 视频</span>
    </div>
  </div>
  <div class="main">
    <div class="main-header">
      <span class="page-title" id="pageTitle">GPT Image 2</span>
      <span style="font-size:.72rem;color:#555">千亿AI · 智能生成平台</span>
    </div>
    <div class="page-container">
      <iframe id="pageFrame" src="gpt-image-2.html" allow="clipboard-read; clipboard-write"></iframe>
    </div>
  </div>
</div>

<script>
var titles={gpt:'GPT Image 2',grok:'Grok 视频',veo:'VEO 视频'};
var pages={gpt:'gpt-image-2.html',grok:'grok.html',veo:'veo.html'};
var frame=document.getElementById('pageFrame');

function switchPage(key){
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active')});
  document.querySelector('.nav-item[data-page="'+key+'"]').classList.add('active');
  document.getElementById('pageTitle').textContent=titles[key];
  frame.src=pages[key];
  try{localStorage.setItem('qy_page',key)}catch(e){}
}

try{
  var saved=localStorage.getItem('qy_page');
  if(saved&&pages[saved]){
    document.getElementById('pageTitle').textContent=titles[saved];
    frame.src=pages[saved];
    document.querySelector('.nav-item[data-page="'+saved+'"]').classList.add('active');
    document.querySelector('.nav-item[data-page="gpt"]').classList.remove('active');
  }
}catch(e){}
</script>
</body>
</html>
