<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>千亿AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif;background:#07070d;color:#d0d0e0}

/* layout */
.app{display:flex;height:100vh}

/* sidebar */
.sidebar{
  width:200px;flex-shrink:0;
  background:rgba(255,255,255,.02);
  border-right:1px solid rgba(255,255,255,.06);
  padding:1rem 0;
  display:flex;flex-direction:column;
}
.sidebar .brand{
  padding:.8rem 1rem;margin-bottom:.5rem;
  display:flex;align-items:center;gap:.5rem;
}
.sidebar .brand-icon{
  width:30px;height:30px;background:linear-gradient(135deg,#6366f1,#06b6d4);
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:.8rem;color:#fff;font-weight:700;
}
.sidebar .brand-text{font-size:.95rem;font-weight:700;background:linear-gradient(135deg,#818cf8,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.nav-item{
  display:flex;align-items:center;gap:.5rem;
  padding:.65rem 1rem;margin:2px 6px;
  border-radius:8px;cursor:pointer;
  font-size:.82rem;color:#8888a0;
  transition:all .15s;user-select:none;
}
.nav-item:hover{background:rgba(255,255,255,.04);color:#c0c0d0}
.nav-item.active{background:rgba(99,102,241,.1);color:#818cf8}
.nav-item .ico{font-size:.9rem}

/* main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-header{
  padding:.7rem 1.2rem;
  border-bottom:1px solid rgba(255,255,255,.06);
  font-size:.85rem;color:#666680;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.main-header .page-title{font-weight:600;color:#b0b0c0}
.main-body{flex:1;overflow:hidden}

.main-body iframe{width:100%;height:100%;border:none;display:none}
.main-body iframe.active{display:block}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="brand">
      <div class="brand-icon">✦</div>
      <span class="brand-text">千亿AI</span>
    </div>
    <div class="nav-item active" data-page="gpt-image-2" onclick="switchPage(this)">
      <span class="ico">🎨</span> GPT Image 2
    </div>
    <div class="nav-item" data-page="grok" onclick="switchPage(this)">
      <span class="ico">🎬</span> Grok 视频
    </div>
    <div class="nav-item" data-page="veo" onclick="switchPage(this)">
      <span class="ico">🎥</span> VEO 视频
    </div>
  </div>
  <div class="main">
    <div class="main-header">
      <span class="page-title" id="pageTitle">GPT Image 2</span>
      <span style="font-size:.72rem;color:#555">千亿AI · 智能生成平台</span>
    </div>
    <div class="main-body">
      <iframe src="gpt-image-2.html" class="active" data-page="gpt-image-2"></iframe>
      <iframe src="grok.html" data-page="grok"></iframe>
      <iframe src="veo.html" data-page="veo"></iframe>
    </div>
  </div>
</div>

<script>
const titles={'gpt-image-2':'GPT Image 2','grok':'Grok 视频','veo':'VEO 视频'};

function switchPage(el){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  const page=el.dataset.page;
  document.getElementById('pageTitle').textContent=titles[page]||page;
  document.querySelectorAll('.main-body iframe').forEach(f=>{
    f.classList.toggle('active',f.dataset.page===page);
  });
  try{localStorage.setItem('qy_active_page',page)}catch(e){}
}

// 恢复上次页面
try{
  const saved=localStorage.getItem('qy_active_page');
  if(saved&&titles[saved]){
    const el=document.querySelector('.nav-item[data-page="'+saved+'"]');
    if(el)switchPage(el);
  }
}catch(e){}
</script>
</body>
</html>
