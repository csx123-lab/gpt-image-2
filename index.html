<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>千亿AI - AI 创作平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:#0a0a14;
  color:#e0e0e0;
  min-height:100vh;
  display:flex;
}
.sidebar{
  width:220px;
  background:rgba(255,255,255,.02);
  border-right:1px solid rgba(255,255,255,.06);
  padding:1.5rem 0;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
}
.sidebar-brand{
  display:flex;
  align-items:center;
  gap:.5rem;
  padding:0 1.2rem 1.5rem;
  border-bottom:1px solid rgba(255,255,255,.06);
  margin-bottom:.5rem;
}
.sidebar-brand span{
  font-weight:800;
  font-size:1.1rem;
  background:linear-gradient(135deg,#10a37f,#06b6d4);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.sidebar .nav-item{
  display:flex;
  align-items:center;
  gap:.6rem;
  padding:.7rem 1.2rem;
  color:#7878a0;
  cursor:pointer;
  transition:all .15s;
  font-size:.88rem;
  border-left:2px solid transparent;
}
.sidebar .nav-item:hover{color:#c0c0d8;background:rgba(255,255,255,.02)}
.sidebar .nav-item.active{
  color:#10a37f;
  border-left-color:#10a37f;
  background:rgba(16,163,127,.04);
}
.nav-section{
  padding:.5rem 1.2rem .3rem;
  font-size:.7rem;
  color:#444;
  letter-spacing:.5px;
  font-weight:600;
}
.main{
  flex:1;
  overflow-y:auto;
  padding:0;
}
.main iframe{
  width:100%;
  height:100vh;
  border:none;
  display:block;
}

/* 首页 */
.home{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:80vh;padding:2rem;text-align:center;
}
.home h1{
  font-size:2rem;margin-bottom:.5rem;
  background:linear-gradient(135deg,#10a37f,#06b6d4);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.home p{color:#7878a0;font-size:.95rem;margin-bottom:2rem}
.home-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;max-width:600px;width:100%}
.home-card{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.07);
  border-radius:12px;padding:1.5rem;
  cursor:pointer;transition:all .15s;text-align:center;
}
.home-card:hover{background:rgba(16,163,127,.04);border-color:rgba(16,163,127,.2);transform:translateY(-2px)}
.home-card h3{font-size:.95rem;margin-bottom:.25rem}
.home-card p{font-size:.78rem;color:#666;margin:0}

@media(max-width:640px){
  body{flex-direction:column}
  .sidebar{
    width:100%;flex-direction:row;overflow-x:auto;
    padding:.5rem;border-right:none;
    border-bottom:1px solid rgba(255,255,255,.06);
  }
  .sidebar-brand{display:none}
  .nav-section{display:none}
  .sidebar .nav-item{
    white-space:nowrap;border-left:none;
    border-bottom:2px solid transparent;
    padding:.5rem .8rem;font-size:.8rem;
  }
  .sidebar .nav-item.active{
    border-left:none;border-bottom-color:#10a37f;
  }
  .main iframe{height:calc(100vh - 48px)}
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand">
    <svg width="24" height="24" viewBox="0 0 34 34" fill="none">
      <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#10a37f"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient></defs>
      <rect x="2" y="2" width="30" height="30" rx="8" fill="url(#g)" opacity=".12"/>
      <rect x="2" y="2" width="30" height="30" rx="8" stroke="url(#g)" stroke-width="1.2" opacity=".4"/>
      <path d="M10 17l5 5 9-9" stroke="url(#g)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>千亿AI</span>
  </div>

  <div class="nav-section">图像工具</div>
  <div class="nav-item" data-page="gpt-image-2" onclick="switchPage(this)">
    GPT Image 2
  </div>

  <div class="nav-section">视频工具</div>
  <div class="nav-item" data-page="veo" onclick="switchPage(this)">
    VEO 视频
  </div>
  <div class="nav-item" data-page="grok" onclick="switchPage(this)">
    Grok 视频
  </div>
</div>

<div class="main">
  <div id="contentArea">
    <div class="home">
      <h1>千亿AI</h1>
      <p>选择左侧工具开始创作</p>
      <div class="home-grid">
        <div class="home-card" onclick="switchPage2('gpt-image-2')">
          <h3>GPT Image 2</h3>
          <p>AI 图片生成</p>
        </div>
        <div class="home-card" onclick="switchPage2('veo')">
          <h3>VEO 视频</h3>
          <p>AI 视频生成</p>
        </div>
        <div class="home-card" onclick="switchPage2('grok')">
          <h3>Grok 视频</h3>
          <p>xAI 视频生成</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const pageMap = {
  'gpt-image-2': 'gpt-image-2.html',
  'veo': 'veo.html',
  'grok': 'grok.html'
};

// === 持久化层（在 index.html 层面，不会被 iframe 销毁影响） ===
const PERSIST_KEY = 've_image_history';
const PENDING_KEY = 've_pending_task';

function saveHistory(entry) {
  var h = [];
  try { h = JSON.parse(localStorage.getItem(PERSIST_KEY) || '[]'); } catch(e) {}
  var thumb = (entry.images && entry.images.length > 0) ? entry.images[0] : '';
  h.unshift({
    prompt: entry.prompt,
    model: entry.model,
    size: entry.size,
    images: entry.images,
    thumb: thumb,
    time: entry.time || Date.now()
  });
  if (h.length > 50) h.length = 50;
  try { localStorage.setItem(PERSIST_KEY, JSON.stringify(h)); } catch(e) {
    h.splice(30);
    try { localStorage.setItem(PERSIST_KEY, JSON.stringify(h)); } catch(e2) {}
  }
}

// 跟踪由父页面代管的 pending fetch（iframe 被切走后，父页面代为等待）
var parentManagedFetch = null;

// 父页面代为发起 fetch 并保存结果
function parentDoFetch(fetchParams) {
    if (!fetchParams || !fetchParams.url || !fetchParams.apiKey) return;
    if (parentManagedFetch) {
        try { parentManagedFetch.abort(); } catch(e) {}
    }
    var ac = new AbortController();
    parentManagedFetch = ac;
    fetch(fetchParams.url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + fetchParams.apiKey },
        body: JSON.stringify(fetchParams.body),
        signal: ac.signal
    }).then(function(resp) {
        if (!resp.ok) return null;
        return resp.json();
    }).then(function(data) {
        if (!data || !data.data || !data.data.length) return;
        var images = [];
        for (var i = 0; i < data.data.length; i++) {
            var imgData = data.data[i];
            if (imgData.b64_json) images.push('data:image/png;base64,' + imgData.b64_json);
            else if (imgData.url) images.push(imgData.url);
        }
        if (images.length > 0) {
            saveHistory({
                prompt: fetchParams.prompt,
                model: fetchParams.model,
                size: fetchParams.size,
                images: images,
                time: fetchParams.time
            });
            try {
                sessionStorage.setItem(PENDING_KEY, JSON.stringify({
                    status: 'completed',
                    prompt: fetchParams.prompt,
                    model: fetchParams.model,
                    size: fetchParams.size,
                    images: images,
                    time: fetchParams.time
                }));
            } catch(e) {}
            console.log('[index] 父页面代为保存生成结果成功');
        }
    }).catch(function(err) {
        if (err.name !== 'AbortError') {
            console.warn('[index] 父页面代管 fetch 失败:', err);
        }
    });
}

// 从 iframe 收到消息
window.addEventListener('message', function(ev) {
  if (!ev.data || !ev.data.type) return;
  var msg = ev.data;

  if (msg.type === 've_save_result') {
    console.log('[index] 收到 iframe 保存请求:', msg.prompt ? msg.prompt.substring(0,30) : '');
    saveHistory({
      prompt: msg.prompt,
      model: msg.model,
      size: msg.size,
      images: msg.images,
      time: msg.time
    });
    try {
      sessionStorage.setItem(PENDING_KEY, JSON.stringify({
        status: 'completed',
        prompt: msg.prompt,
        model: msg.model,
        size: msg.size,
        images: msg.images,
        time: msg.time
      }));
    } catch(e) {}
  }

  if (msg.type === 've_takeover_request') {
    // 收到 iframe 的请求参数，由父页面代为发起 fetch 并持久化
    console.log('[index] 收到接管请求:', msg.fetchParams ? msg.fetchParams.prompt.substring(0,30) : '');
    parentDoFetch(msg.fetchParams);
  }

  if (msg.type === 've_page_leaving') {
    var task = msg.pending;
    if (task && task.status === 'pending' && task.fetchParams) {
      console.log('[index] iframe 即将销毁，父页面代管 fetch');
      parentDoFetch(task.fetchParams);
    }
  }
});

function switchPage(el){
  // 切换前检查是否有进行中的任务并转发给父页面保存
  var currentIframe = document.querySelector('#contentArea iframe');
  if (currentIframe) {
    try {
      currentIframe.contentWindow.postMessage({ type: 'pageWillSwitch' }, '*');
    } catch(e) {}
  }

  document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
  el.classList.add('active');
  var page = el.dataset.page;
  var url = pageMap[page];
  if (url) {
    document.getElementById('contentArea').innerHTML = '<iframe src="' + url + '"></iframe>';
    try { localStorage.setItem('qy_active_page', page); } catch(e) {}
  }

  // 切换后检查：是否有 completed 的遗留任务需要通知用户
  try {
    var pending = sessionStorage.getItem(PENDING_KEY);
    if (pending) {
      var task = JSON.parse(pending);
      if (task.status === 'completed' && task.images && task.images.length > 0) {
        // 确认历史中已有
        var h = [];
        try { h = JSON.parse(localStorage.getItem(PERSIST_KEY) || '[]'); } catch(e) {}
        var exists = h.some(function(e) {
          return e.time === task.time;
        });
        if (!exists) {
          saveHistory(task);
        }
        alert('📸 检测到上次切换页面时完成的生成结果，已保存到历史记录。\n\n切换到 GPT Image 2 即可查看。');
        sessionStorage.removeItem(PENDING_KEY);
      }
    }
  } catch(e) {}
}

function switchPage2(page){
  var el = document.querySelector('.nav-item[data-page="'+page+'"]');
  if (el) switchPage(el);
}

try {
  var saved = localStorage.getItem('qy_active_page');
  if (saved && pageMap[saved]) {
    var el = document.querySelector('.nav-item[data-page="'+saved+'"]');
    if (el) switchPage(el);
  }
} catch(e) {}
</script>
<div style="position:fixed;bottom:0;left:0;width:220px;height:1px;background:linear-gradient(90deg,transparent,rgba(99,102,241,.15),transparent);pointer-events:none"></div>
</body>
</html>
