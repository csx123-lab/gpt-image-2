<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>千亿AI - VEO 视频生成</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0a0a14;
  color: #e0e0e0;
  min-height: 100vh;
}
.container { max-width: 600px; margin: 0 auto; padding: 2rem 1rem; }
header { text-align: center; margin-bottom: 2rem; }
header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.3rem; }
header p { color: #666; font-size: 0.82rem; }

.card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 16px;
  padding: 1.5rem;
  margin-bottom: 1rem;
}
.card h3 {
  font-size: 0.8rem; color: #7878a0;
  margin-bottom: 1rem;
  font-weight: 600;
}

.form-group { margin-bottom: 1rem; }
.form-group label {
  display: block; font-size: 0.8rem;
  color: #8888aa; margin-bottom: 0.3rem;
  font-weight: 500;
}
input, textarea, select {
  width: 100%; padding: 0.7rem 0.9rem;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  color: #e0e0e0; font-size: 0.9rem;
  outline: none; font-family: inherit;
}
textarea { resize: vertical; min-height: 70px; }
input:focus, textarea:focus, select:focus { border-color: #10a37f; box-shadow: 0 0 0 1px rgba(16,163,127,0.2); }
select { cursor: pointer; }
select option { background: #0c0c18; color: #e0e0e0; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
@media (max-width:500px) { .form-row { grid-template-columns: 1fr; } }

.btn {
  width: 100%; padding: 0.8rem;
  border: none; border-radius: 12px;
  background: linear-gradient(135deg, #10a37f, #06b6d4);
  color: white; font-size: 1rem; font-weight: 600;
  cursor: pointer; transition: opacity 0.2s;
}
.btn:hover { opacity: 0.9; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-sm {
  padding: 0.4rem 0.8rem;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  background: rgba(255,255,255,0.04);
  color: #8888aa;
  font-size: 0.75rem;
  cursor: pointer;
}
.btn-sm:hover { background: rgba(255,255,255,0.08); color: #c0c0d0; }

.msg {
  padding: 0.7rem 0.9rem; border-radius: 10px;
  margin-top: 0.8rem; font-size: 0.85rem;
}
.msg-error { color: #f87171; background: rgba(248,113,113,0.06); border: 1px solid rgba(248,113,113,0.12); }
.msg-warning { color: #fbbf24; background: rgba(251,191,36,0.06); border: 1px solid rgba(251,191,36,0.12); }
.msg-info { color: #93c5fd; background: rgba(147,197,253,0.06); border: 1px solid rgba(147,197,253,0.12); }
.msg-success { color: #6ee7b7; background: rgba(110,231,183,0.06); border: 1px solid rgba(110,231,183,0.12); }

.result-area { display: none; }
.result-area.visible { display: block; }
video { width: 100%; border-radius: 10px; }

.model-desc {
  background: rgba(16,163,127,0.06);
  border: 1px solid rgba(16,163,127,0.1);
  border-radius: 10px;
  padding: 0.6rem 0.9rem;
  margin-bottom: 0.8rem;
  font-size: 0.82rem;
}

.progress-bar {
  height: 4px;
  background: rgba(16,163,127,0.1);
  border-radius: 2px;
  margin: 0.8rem 0;
  overflow: hidden;
}
.progress-bar-inner {
  height: 100%;
  background: linear-gradient(90deg, #10a37f, #06b6d4);
  border-radius: 2px;
  transition: width 1s ease;
  width: 0%;
}

.history-item {
  display: flex; gap: 0.8rem;
  padding: 0.8rem 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  align-items: center;
}
.history-item:last-child { border-bottom: none; }
.history-thumb { width: 80px; height: 45px; border-radius: 6px; background: rgba(255,255,255,0.04); flex-shrink: 0; overflow: hidden; }
.history-thumb video, .history-thumb img { width: 100%; height: 100%; object-fit: cover; }
.history-info { flex: 1; min-width: 0; }
.history-info .hi-model { font-size: 0.75rem; color: #10a37f; }
.history-info .hi-prompt { font-size: 0.8rem; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.history-info .hi-time { font-size: 0.7rem; color: #555; }
.history-actions { display: flex; gap: 0.3rem; }
</style>
</head>
<body>
<div class="container">

<header>
  <div style="display:flex;align-items:center;justify-content:center;gap:0.5rem;margin-bottom:0.5rem;">
    <svg width="28" height="28" viewBox="0 0 34 34" fill="none">
      <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#10a37f"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient></defs>
      <rect x="2" y="2" width="30" height="30" rx="8" fill="url(#g)" opacity="0.12"/>
      <rect x="2" y="2" width="30" height="30" rx="8" stroke="url(#g)" stroke-width="1.2" opacity="0.4"/>
      <path d="M10 17l5 5 9-9" stroke="url(#g)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span style="font-weight:800;font-size:1.1rem;background:linear-gradient(135deg,#10a37f,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">千亿AI</span>
  </div>
  <h1>VEO 视频生成</h1>
  <p>AI 视频生成，支持参考图 | 自动查询进度</p>
</header>

<div class="card">
  <h3>⚙️ 生成设置</h3>

  <div class="form-group">
    <label>API 密钥</label>
    <input type="password" id="apiKey" placeholder="输入密钥" />
  </div>

  <div class="form-group">
    <label>模型</label>
    <select id="modelSelect">
      <option value="veo_3_1-fast-4K">veo_3_1-fast-4K</option>
      <option value="veo_3_1-fast" selected>veo_3_1-fast</option>
      <option value="veo3.1-fast-components">veo3.1-fast-components</option>
      <option value="veo_3_1-lite-4K">veo_3_1-lite-4K</option>
      <option value="veo_3_1-lite">veo_3_1-lite</option>
    </select>
  </div>

  <div class="model-desc" id="modelDesc">veo_3_1-fast - 快速版，支持参考图</div>

  <div class="form-group">
    <label>画面比例</label>
    <select id="aspectSelect">
      <option value="16:9">16:9（横屏）</option>
      <option value="9:16">9:16（竖屏）</option>
    </select>
  </div>

  <div class="form-group" style="border:1px dashed rgba(255,255,255,0.08);border-radius:10px;padding:1rem;">
    <label style="display:flex;align-items:center;gap:0.4rem;">
      <input type="checkbox" id="enableImage" /> 上传参考图 / 首尾帧
    </label>
    <div id="imageFields" style="display:none;margin-top:0.8rem;">
      <div class="form-group">
        <label>参考图片（多选）</label>
        <input type="file" id="imageInput" accept="image/*" multiple style="padding:0.5rem;font-size:0.8rem;" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>首帧</label>
          <input type="file" id="startFrameInput" accept="image/*" style="padding:0.5rem;font-size:0.8rem;" />
        </div>
        <div class="form-group">
          <label>尾帧</label>
          <input type="file" id="endFrameInput" accept="image/*" style="padding:0.5rem;font-size:0.8rem;" />
        </div>
      </div>
    </div>
  </div>

  <div class="form-group">
    <label>视频描述</label>
    <textarea id="prompt" placeholder="A cat running in the park"></textarea>
  </div>

  <button class="btn" id="generateBtn">生成视频</button>
  <div id="messageArea">
    <div class="progress-bar" id="progressBar" style="display:none;">
      <div class="progress-bar-inner" id="progressInner"></div>
    </div>
  </div>
</div>

<div class="card result-area" id="resultArea">
  <h3>📹 生成结果</h3>
  <div id="videoContainer"></div>
</div>

<div class="card" id="historyCard">
  <h3>📋 历史记录 <span id="historyCount"></span></h3>
  <div id="historyList"></div>
  <div id="historyEmpty" style="text-align:center;padding:1rem;color:#555;font-size:0.85rem;">暂无记录</div>
</div>

</div>

<script>
const API_BASE = 'https://api.vectorengine.cn';
const $ = id => document.getElementById(id);

// 模型描述
const MODELS = {
  'veo_3_1-fast-4K': '快速版 · 4K · 支持参考图',
  'veo_3_1-fast': '快速版 · 支持参考图',
  'veo3.1-fast-components': '快速版 + 元素图/首尾帧',
  'veo_3_1-lite-4K': '轻量版 · 4K · 纯文本',
  'veo_3_1-lite': '轻量版 · 纯文本'
};
$('modelSelect').addEventListener('change', () => {
  $('modelDesc').textContent = $('modelSelect').value + ' - ' + (MODELS[$('modelSelect').value] || '');
});
$('modelSelect').dispatchEvent(new Event('change'));

// 图片开关
$('enableImage').addEventListener('change', function() {
  $('imageFields').style.display = this.checked ? 'block' : 'none';
});

// 历史记录
function getHistory() {
  try { return JSON.parse(localStorage.getItem('veo_history') || '[]'); } catch { return []; }
}
function saveHistory(items) { localStorage.setItem('veo_history', JSON.stringify(items)); }
function addHistory(item) {
  const items = getHistory();
  items.unshift(item);
  if (items.length > 50) items.length = 50;
  saveHistory(items);
  renderHistory();
}
function renderHistory() {
  const items = getHistory();
  $('historyCount').textContent = items.length ? '(' + items.length + ')' : '';
  if (!items.length) { $('historyList').innerHTML = ''; $('historyEmpty').style.display = 'block'; return; }
  $('historyEmpty').style.display = 'none';
  $('historyList').innerHTML = items.map((item, i) =>
    '<div class="history-item">' +
      '<div class="history-thumb"><video src="' + item.url + '" muted preload="metadata"></video></div>' +
      '<div class="history-info">' +
        '<div class="hi-model">' + item.model + '</div>' +
        '<div class="hi-prompt">' + escHtml(item.prompt.slice(0, 60)) + '</div>' +
        '<div class="hi-time">' + new Date(item.time).toLocaleString() + '</div>' +
      '</div>' +
      '<div class="history-actions">' +
        '<button class="btn-sm" onclick="playHistory(' + i + ')">播放</button>' +
        '<button class="btn-sm" onclick="copyHistoryUrl(' + i + ')">链接</button>' +
        '<button class="btn-sm" onclick="deleteHistory(' + i + ')" style="color:#f87171;">删除</button>' +
      '</div>' +
    '</div>'
  ).join('');
}
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function playHistory(i) {
  const item = getHistory()[i];
  if (!item) return;
  $('videoContainer').innerHTML = '<video src="' + item.url + '" controls autoplay style="width:100%"></video>';
  $('resultArea').classList.add('visible');
  $('resultArea').scrollIntoView({ behavior: 'smooth' });
}
function copyHistoryUrl(i) {
  const item = getHistory()[i];
  if (item) navigator.clipboard.writeText(item.url).then(() => showMsg('success', '链接已复制'));
}
function deleteHistory(i) {
  const items = getHistory();
  items.splice(i, 1);
  saveHistory(items);
  renderHistory();
}
renderHistory();

// ========== 主流程 ==========
let pollTimer = null;

$('generateBtn').addEventListener('click', async function() {
  const apiKey = $('apiKey').value.trim();
  const prompt = $('prompt').value.trim();
  const model = $('modelSelect').value;

  if (!apiKey) { showMsg('error', '请输入 API 密钥'); return; }
  if (!prompt) { showMsg('error', '请输入视频描述'); return; }

  clearMsg();
  $('resultArea').classList.remove('visible');
  if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; }
  this.disabled = true;
  this.textContent = '生成中...';

  try {
    const body = { model, prompt, aspect_ratio: $('aspectSelect').value, enhance_prompt: true, enable_upsample: true };

    // 图片处理
    if ($('enableImage').checked) {
      const rf = $('imageInput').files;
      const sf = $('startFrameInput').files[0];
      const ef = $('endFrameInput').files[0];
      if (rf.length > 0 || sf || ef) {
        body.images = [];
        for (const f of rf) body.images.push(await fileToBase64(f));
        if (sf) body.images.push(await fileToBase64(sf));
        if (ef) body.images.push(await fileToBase64(ef));
      }
    }

    showMsg('info', '提交任务中...');

    const resp = await fetch(API_BASE + '/v1/video/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify(body)
    });

    if (!resp.ok) {
      let err;
      try { err = await resp.json(); } catch { throw new Error(await resp.text()); }
      throw new Error(err.message || JSON.stringify(err));
    }

    const data = await resp.json();
    console.log('Create:', data);

    // 如果直接返回了视频
    if (data.video_url) {
      showVideo(data.video_url, model, prompt);
      return;
    }

    // 如果直接 SUCCESS + data.video_url
    if (data.status === 'SUCCESS' && data.data && data.data.video_url) {
      showVideo(data.data.video_url, model, prompt);
      return;
    }

    // 否则进入轮询：GET /v1/video/query?id=完整id
    const taskId = data.id;
    if (!taskId) {
      showMsg('warning', '未获取到任务ID：' + JSON.stringify(data).slice(0, 200));
      return;
    }

    showMsg('info', '任务已提交，查询进度中...');
    showProgress(true);
    pollTask(apiKey, taskId, model, prompt);

  } catch (err) {
    showMsg('error', err.message);
  }

  this.disabled = false;
  this.textContent = '生成视频';
});

// 轮询任务状态
async function pollTask(apiKey, taskId, model, prompt) {
  for (let i = 0; i < 120; i++) { // 120 * 3s = 6分钟
    await new Promise(r => setTimeout(r, 3000));
    try {
      const url = API_BASE + '/v1/video/query?id=' + encodeURIComponent(taskId);
      const resp = await fetch(url, {
        method: 'GET',
        headers: { 'Accept': 'application/json', 'Authorization': 'Bearer ' + apiKey }
      });
      if (!resp.ok) continue;

      const data = await resp.json();
      console.log('Query [' + i + ']:', data.status, data.progress);

      // 显示进度
      if (data.progress) {
        const pct = parseInt(data.progress) || 0;
        showProgress(true, pct);
      }

      // 完成
      const st = (data.status || '').toLowerCase();
      if (st === 'completed' && data.video_url) {
        showProgress(false);
        showVideo(data.video_url, model, prompt);
        return;
      }

      // 失败
      if (st === 'failed' || st === 'error') {
        showProgress(false);
        const errMsg = data.error || (data.data && data.data.error && data.data.error.message) || data.fail_reason || st;
        showMsg('error', '生成失败: ' + errMsg);
        return;
      }

      if (i % 10 === 0) showMsg('info', '生成中... ' + (data.progress || Math.round(i * 3) + 's'));

    } catch(e) {
      if (i > 5) throw e;
    }
  }

  showProgress(false);
  showMsg('warning', '等待超时，task_id: ' + taskId);
}

// 显示视频
function showVideo(url, model, prompt) {
  $('videoContainer').innerHTML = '<video src="' + url + '" controls autoplay style="width:100%"></video>';
  $('resultArea').classList.add('visible');
  $('resultArea').scrollIntoView({ behavior: 'smooth' });
  addHistory({ url, model, prompt: prompt || '(空)', time: Date.now() });
  showMsg('success', '生成成功！');
}

// 进度条
function showProgress(show, pct) {
  const bar = $('progressBar');
  const inner = $('progressInner');
  if (!show) { bar.style.display = 'none'; return; }
  bar.style.display = 'block';
  inner.style.width = (pct || 0) + '%';
}

// 图片转 base64
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        const max = 1024;
        if (w > max || h > max) {
          if (w > h) { h = Math.round(h * max / w); w = max; }
          else { w = Math.round(w * max / h); h = max; }
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL(file.type, 0.7));
      };
      img.onerror = () => resolve(reader.result);
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// 消息
function showMsg(type, text) {
  $('messageArea').innerHTML = '<div class="msg msg-' + type + '">' + text + '</div>';
}
function clearMsg() { $('messageArea').innerHTML = ''; }

// 密钥保存
try { const saved = localStorage.getItem('ve_video_key'); if (saved) $('apiKey').value = saved; } catch(e) {}
$('apiKey').addEventListener('input', function() {
  try { localStorage.setItem('ve_video_key', this.value.trim()); } catch(e) {}
});
</script>
</body>
</html>
