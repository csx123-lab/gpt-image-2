<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>千亿AI - VEO 视频生成</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0a0a14;
  color: #e0e0e0;
  min-height: 100vh;
}
.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 2rem 1rem;
}
header { text-align: center; margin-bottom: 2rem; }
header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.3rem; }
header p { color: #666; font-size: 0.82rem; }

.card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 16px;
  padding: 1.5rem;
  margin-bottom: 1rem;
}
.card h3 {
  font-size: 0.8rem; color: #7878a0;
  margin-bottom: 1rem;
  font-weight: 600; letter-spacing: 0.5px;
}

.form-group { margin-bottom: 1rem; }
.form-group label {
  display: block; font-size: 0.8rem;
  color: #8888aa; margin-bottom: 0.3rem;
  font-weight: 500;
}
input, textarea, select {
  width: 100%; padding: 0.7rem 0.9rem;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  color: #e0e0e0; font-size: 0.9rem;
  outline: none; font-family: inherit;
}
textarea { resize: vertical; min-height: 70px; }
input:focus, textarea:focus, select:focus {
  border-color: #10a37f;
  box-shadow: 0 0 0 1px rgba(16,163,127,0.2);
}
select { cursor: pointer; }
select option { background: #0c0c18; color: #e0e0e0; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
@media (max-width:500px) { .form-row { grid-template-columns: 1fr; } }

.btn {
  width: 100%; padding: 0.8rem;
  border: none; border-radius: 12px;
  background: linear-gradient(135deg, #10a37f, #06b6d4);
  color: white; font-size: 1rem; font-weight: 600;
  cursor: pointer; transition: opacity 0.2s;
}
.btn:hover { opacity: 0.9; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.msg {
  padding: 0.7rem 0.9rem; border-radius: 10px;
  margin-top: 0.8rem; font-size: 0.85rem;
}
.msg-error { color: #f87171; background: rgba(248,113,113,0.06); border: 1px solid rgba(248,113,113,0.12); }
.msg-info { color: #93c5fd; background: rgba(147,197,253,0.06); border: 1px solid rgba(147,197,253,0.12); }
.msg-success { color: #6ee7b7; background: rgba(110,231,183,0.06); border: 1px solid rgba(110,231,183,0.12); }

.result-area { display: none; }
.result-area.visible { display: block; }

video { width: 100%; border-radius: 10px; }

.model-desc {
  background: rgba(16,163,127,0.06);
  border: 1px solid rgba(16,163,127,0.1);
  border-radius: 10px;
  padding: 0.6rem 0.9rem;
  margin-bottom: 0.8rem;
  font-size: 0.82rem;
}
.size-hide { display: none; }
</style>
</head>
<body>
<div class="container">

<header>
  <div style="display:flex;align-items:center;justify-content:center;gap:0.5rem;margin-bottom:0.5rem;">
    <svg width="28" height="28" viewBox="0 0 34 34" fill="none">
      <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#10a37f"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient></defs>
      <rect x="2" y="2" width="30" height="30" rx="8" fill="url(#g)" opacity="0.12"/>
      <rect x="2" y="2" width="30" height="30" rx="8" stroke="url(#g)" stroke-width="1.2" opacity="0.4"/>
      <path d="M10 17l5 5 9-9" stroke="url(#g)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span style="font-weight:800;font-size:1.1rem;background:linear-gradient(135deg,#10a37f,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">千亿AI</span>
  </div>
  <h1>VEO 视频生成</h1>
  <p>AI 视频生成，支持参考图</p>
</header>

<div class="card">
  <h3>生成设置</h3>

  <div class="form-group">
    <label>API 密钥</label>
    <input type="password" id="apiKey" placeholder="输入密钥" />
  </div>

  <div class="form-group">
    <label>模型</label>
    <select id="modelSelect">
      <option value="veo_3_1-fast-4K">veo_3_1-fast-4K</option>
      <option value="veo_3_1-fast" selected>veo_3_1-fast</option>
      <option value="veo3.1-fast-components">veo3.1-fast-components</option>
      <option value="veo_3_1-lite-4K">veo_3_1-lite-4K</option>
      <option value="veo_3_1-lite">veo_3_1-lite</option>
    </select>
  </div>

  <div class="model-desc" id="modelDesc">veo_3_1-fast - 快速版，支持参考图</div>

  <div class="form-group">
    <label>画面比例</label>
    <select id="aspectSelect">
      <option value="16:9">16:9（横屏）</option>
      <option value="9:16">9:16（竖屏）</option>
    </select>
  </div>

  <div class="form-group">
    <label>参考图片（可选，符合模型支持的类型）</label>
    <input type="file" id="imageInput" accept="image/png,image/jpeg,image/webp" multiple style="padding:0.5rem;font-size:0.8rem;" />
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>首帧（可选）</label>
      <input type="file" id="startFrameInput" accept="image/png,image/jpeg,image/webp" style="padding:0.5rem;font-size:0.8rem;" />
    </div>
    <div class="form-group">
      <label>尾帧（可选）</label>
      <input type="file" id="endFrameInput" accept="image/png,image/jpeg,image/webp" style="padding:0.5rem;font-size:0.8rem;" />
    </div>
  </div>

  <div class="form-group">
    <label>视频描述 (Prompt)</label>
    <textarea id="prompt" placeholder="A cat running in the park"></textarea>
  </div>

  <button class="btn" id="generateBtn">生成视频</button>
  <div id="messageArea"></div>
</div>

<div class="card result-area" id="resultArea">
  <h3>生成结果</h3>
  <div id="videoContainer"></div>
</div>

</div>

<script>
const API_BASE = 'https://api.vectorengine.cn';

const MODELS = {
  'veo_3_1-fast-4K': { desc: '快速版 · 4K · 支持参考图' },
  'veo_3_1-fast': { desc: '快速版 · 支持参考图' },
  'veo3.1-fast-components': { desc: '快速版 + 元素图/首尾帧' },
  'veo_3_1-lite-4K': { desc: '轻量版 · 4K · 纯文本' },
  'veo_3_1-lite': { desc: '轻量版 · 纯文本' }
};

const $ = id => document.getElementById(id);
const modelSelect = $('modelSelect');
const modelDesc = $('modelDesc');

modelSelect.addEventListener('change', function() {
  const m = MODELS[this.value];
  modelDesc.textContent = this.value + ' - ' + (m ? m.desc : '');
});
modelSelect.dispatchEvent(new Event('change'));

$('generateBtn').addEventListener('click', async function() {
  const apiKey = $('apiKey').value.trim();
  const prompt = $('prompt').value.trim();
  const model = modelSelect.value;

  if (!apiKey) { showMsg('error', '请输入 API 密钥'); return; }
  if (!prompt) { showMsg('error', '请输入视频描述'); return; }

  clearMsg();
  $('resultArea').classList.remove('visible');
  this.disabled = true;
  this.textContent = '生成中...';

  try {
    const body = {
      model: model,
      prompt: prompt,
      aspect_ratio: $('aspectSelect').value,
      enhance_prompt: true,
      enable_upsample: '1'
    };

    // 处理图片上传
    const refFiles = $('imageInput').files;
    const startFile = $('startFrameInput').files[0];
    const endFile = $('endFrameInput').files[0];
    const hasImages = refFiles.length > 0 || startFile || endFile;

    if (hasImages) {
      body.images = [];
      for (const f of refFiles) body.images.push(await fileToBase64(f));
      if (startFile) body.images.push(await fileToBase64(startFile));
      if (endFile) body.images.push(await fileToBase64(endFile));
    }

    console.log('Request:', JSON.stringify(body, null, 2));
    showMsg('info', '正在提交请求...');

    const resp = await fetch(API_BASE + '/v1/video/create', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'application/json',
        'Authorization': 'Bearer ' + apiKey
      },
      body: JSON.stringify(body)
    });

    if (!resp.ok) {
      let detail = '';
      try { const err = await resp.json(); detail = err.error?.message || err.message || JSON.stringify(err); }
      catch { detail = await resp.text(); }
      throw new Error('HTTP ' + resp.status + ': ' + detail);
    }

    const data = await resp.json();
    console.log('Response:', data);

    let videoUrl = data.url || data.video_url || '';
    if (data.data && data.data.length > 0) {
      videoUrl = data.data[0].url || data.data[0].video_url || videoUrl;
    }
    if (data.output) videoUrl = data.output.video_url || data.output.url || videoUrl;

    if (videoUrl) {
      const vc = $('videoContainer');
      vc.innerHTML = '<video src="' + videoUrl + '" controls style="width:100%"></video>';
      $('resultArea').classList.add('visible');
      showMsg('success', '生成成功！');
    } else if (data.task_id || data.id) {
      const taskId = data.task_id || data.id;
      showMsg('info', '任务已提交，正在查询结果... (task: ' + taskId + ')');
      await pollTask(apiKey, taskId);
    } else {
      showMsg('info', '返回数据：' + JSON.stringify(data).slice(0, 200));
    }

  } catch (err) {
    console.error(err);
    showMsg('error', err.message || '请求失败');
  }

  this.disabled = false;
  this.textContent = '生成视频';
});

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}async function pollTask(apiKey, taskId, maxTry = 60) {
  for (let i = 0; i < maxTry; i++) {
    await new Promise(r => setTimeout(r, 3000));
    try {
      const resp = await fetch(API_BASE + '/v1/video/status/' + taskId, {
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json',
          'Authorization': 'Bearer ' + apiKey
        }
      });
      if (!resp.ok) continue;
      const data = await resp.json();
      const st = (data.status || data.state || '').toLowerCase();
      if (st === 'succeeded' || st === 'completed' || st === 'done') {
        const url = data.output?.video_url || data.output?.url || data.video_url || data.url || '';
        if (url) {
          const vc = $('videoContainer');
          vc.innerHTML = '<video src="' + url + '" controls style="width:100%"></video>';
          $('resultArea').classList.add('visible');
          showMsg('success', '生成成功！');
          return;
        }
      }
      if (st === 'failed' || st === 'error') throw new Error('生成失败: ' + (data.error || ''));
      if (i % 10 === 0) showMsg('info', '生成中... (' + Math.round(i * 3) + 's)');
    } catch(e) { if (i > 3) throw e; }
  }
  showMsg('info', '超时，任务可能仍在处理');
}

function showMsg(type, text) {
  const el = $('messageArea');
  el.innerHTML = '<div class="msg msg-' + type + '">' + text + '</div>';
}
function clearMsg() { $('messageArea').innerHTML = ''; }

// 恢复密钥
try {
  const saved = localStorage.getItem('ve_video_key');
  if (saved) $('apiKey').value = saved;
} catch(e) {}
</script>
</body>
</html>
